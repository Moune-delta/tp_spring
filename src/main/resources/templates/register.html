<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inscription — ProductAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header bg-dark text-white text-center py-3">
            <h4 class="mb-0">Créer un compte</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username"
                           class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" id="password" name="password"
                           class="form-control" required>
                </div>
                <div class="mb-4">
                    <label for="role" class="form-label fw-semibold">Rôle</label>
                    <select id="role" name="role" class="form-select">
                        <option value="USER" selected>USER — lecture seule</option>
                        <option value="ADMIN">ADMIN — accès complet</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-dark w-100">Créer le compte</button>
            </form>

            <div class="text-center mt-3">
                <a href="/login">Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
