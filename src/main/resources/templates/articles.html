<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Articles — ProductAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">Gestion des Articles</h2>

    <!-- Formulaire d'ajout : ADMIN uniquement -->
    <div sec:authorize="hasRole('ADMIN')" class="card mb-4 shadow-sm">
        <div class="card-header bg-secondary text-white">Publier un article</div>
        <div class="card-body">
            <form th:action="@{/articles}" th:object="${newArticle}" method="post">
                <div class="mb-3">
                    <label class="form-label">Titre</label>
                    <input type="text" th:field="*{title}" class="form-control"
                           placeholder="Titre de l'article" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contenu</label>
                    <textarea th:field="*{content}" class="form-control" rows="3"
                              placeholder="Contenu de l'article..."></textarea>
                </div>
                <button type="submit" class="btn btn-secondary">Publier</button>
            </form>
        </div>
    </div>

    <!-- Message pour les USERs -->
    <div sec:authorize="!hasRole('ADMIN')" class="alert alert-info mb-4">
        Vous êtes connecté en tant que <strong>USER</strong>.
        Seuls les ADMINs peuvent publier des articles.
    </div>

    <!-- Liste des articles -->
    <div th:if="${#lists.isEmpty(articles)}" class="alert alert-light border">
        Aucun article publié pour l'instant.
    </div>

    <div th:each="article : ${articles}" class="card mb-3 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong th:text="${article.title}"></strong>
            <span class="badge bg-secondary"
                  th:text="${#lists.size(article.comments)} + ' commentaire(s)'"></span>
        </div>
        <div class="card-body">
            <p class="card-text mb-0" th:text="${article.content}"></p>
        </div>
        <div class="card-footer text-muted">
            <small th:text="'ID : ' + ${article.id}"></small>
        </div>
    </div>
</div>
</body>
</html>
