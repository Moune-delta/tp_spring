<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produits — ProductAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">Gestion des Produits</h2>

    <!-- Formulaire d'ajout : ADMIN uniquement -->
    <div sec:authorize="hasRole('ADMIN')" class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">Ajouter un produit</div>
        <div class="card-body">
            <form th:action="@{/products}" th:object="${newProduct}" method="post">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Nom</label>
                        <input type="text" th:field="*{name}" class="form-control"
                               placeholder="Ex: Laptop" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Prix (MRU)</label>
                        <input type="number" th:field="*{price}" class="form-control"
                               placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Description</label>
                        <input type="text" th:field="*{description}" class="form-control"
                               placeholder="Description du produit">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Ajouter</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Message pour les USERs -->
    <div sec:authorize="!hasRole('ADMIN')" class="alert alert-info mb-4">
        Vous êtes connecté en tant que <strong>USER</strong>.
        Seuls les ADMINs peuvent ajouter des produits.
    </div>

    <!-- Liste des produits -->
    <div class="card shadow-sm">
        <div class="card-header d-flex align-items-center">
            <span>Liste des produits</span>
            <span class="badge bg-secondary ms-2" th:text="${#lists.size(products)}">0</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Nom</th>
                        <th>Prix</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${#numbers.formatDecimal(p.price, 1, 'COMMA', 0, 'POINT') + ' MRU'}"></td>
                        <td th:text="${p.description}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="4" class="text-center text-muted py-3">Aucun produit enregistré</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
