<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion — ProductAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header bg-dark text-white text-center py-3">
            <h4 class="mb-0">ProductAPI — Connexion</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${param.error}" class="alert alert-danger">
                Identifiant ou mot de passe incorrect.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                Vous avez été déconnecté avec succès.
            </div>
            <div th:if="${param.registered}" class="alert alert-success">
                Compte créé. Vous pouvez vous connecter.
            </div>

            <!-- Spring Security traite automatiquement le POST /login -->
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username"
                           class="form-control" autofocus required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" id="password" name="password"
                           class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark w-100">Se connecter</button>
            </form>

            <div class="text-center mt-3">
                <small>Pas encore de compte ? <a href="/register">S'inscrire</a></small>
            </div>

            <hr>
            <div class="p-2 bg-light rounded border">
                <small class="text-muted">
                    <strong>Comptes de test :</strong><br>
                    <code>admin</code> / <code>admin123</code> → ADMIN (peut créer)<br>
                    <code>user</code> &nbsp;/ <code>user123</code> &nbsp;→ USER &nbsp;(lecture seule)
                </small>
            </div>
        </div>
    </div>
</div>
</body>
</html>
