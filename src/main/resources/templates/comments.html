<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Commentaires — ProductAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">Gestion des Commentaires</h2>

    <!-- Formulaire d'ajout : tout utilisateur authentifié -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-success text-white">Ajouter un commentaire</div>
        <div class="card-body">

            <!-- Message si aucun article n'existe -->
            <div th:if="${#lists.isEmpty(articles)}" class="alert alert-warning">
                Aucun article disponible. Créez un article d'abord avant d'ajouter un commentaire.
            </div>

            <form th:if="${!#lists.isEmpty(articles)}"
                  th:action="@{/comments}" method="post">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Auteur</label>
                        <input type="text" name="author" class="form-control"
                               placeholder="Votre nom" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Commentaire</label>
                        <input type="text" name="text" class="form-control"
                               placeholder="Votre commentaire..." required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Article concerné</label>
                        <select name="articleId" class="form-select" required>
                            <option value="" disabled selected>-- Choisir un article --</option>
                            <option th:each="a : ${articles}"
                                    th:value="${a.id}"
                                    th:text="${a.title}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">Ajouter</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Liste des commentaires -->
    <div class="card shadow-sm">
        <div class="card-header d-flex align-items-center">
            <span>Liste des commentaires</span>
            <span class="badge bg-secondary ms-2"
                  th:text="${#lists.size(comments)}">0</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Auteur</th>
                        <th>Commentaire</th>
                        <th>Article</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${comments}">
                        <td th:text="${c.id}"></td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${c.author}"></span>
                        </td>
                        <td th:text="${c.text}"></td>
                        <td>
                            <span class="text-primary fw-semibold"
                                  th:text="${c.article != null ? c.article.title : '—'}">
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(comments)}">
                        <td colspan="4" class="text-center text-muted py-3">
                            Aucun commentaire pour l'instant
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
