<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ProductAPI</a>
        <div class="d-flex align-items-center gap-2">
            <a class="btn btn-outline-light btn-sm" href="/products">Produits</a>
            <a class="btn btn-outline-light btn-sm" href="/articles">Articles</a>
            <a class="btn btn-outline-light btn-sm" href="/comments">Commentaires</a>

            <span class="navbar-text text-light ms-3" sec:authorize="isAuthenticated()">
                <strong sec:authentication="name"></strong>
                <span class="badge bg-danger ms-1" sec:authorize="hasRole('ADMIN')">ADMIN</span>
                <span class="badge bg-success ms-1" sec:authorize="!hasRole('ADMIN')">USER</span>
            </span>

            <form th:action="@{/logout}" method="post"
                  sec:authorize="isAuthenticated()" class="ms-2 mb-0">
                <button type="submit" class="btn btn-outline-danger btn-sm">Déconnexion</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
